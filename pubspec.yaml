name: tabattal
description: "A comprehensive Quran application featuring reading, audio playback, and studying tools."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  dio: ^5.9.2
  just_audio: ^0.10.5
  audio_service: ^0.18.18
  shared_preferences: ^2.5.5
  bloc_concurrency: ^0.3.0
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.0
  scrollable_positioned_list: ^0.3.8
  flutter_screenutil: ^5.9.3
  sqflite_common_ffi: ^2.4.2
  sqflite_common_ffi_web: ^1.1.2
  archive: ^4.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/data/
    - assets/data/quran.db
    - assets/fonts/quran_fonts.zip

  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
    - family: QCF_BSML
      fonts:
        - asset: "assets/fonts/QCF_BSML.TTF"
    - family: KFGQPC HAFS Uthmanic Script Regular
      fonts:
        - asset: "assets/fonts/KFGQPC HAFS Uthmanic Script Regular.ttf"
    - family: QCF_Surah
      fonts:
        - asset: "assets/fonts/surah_names.ttf"

